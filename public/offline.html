<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline · Smart Home</title>
<meta name="theme-color" content="#0F172A" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0F172A; color: #E5E7EB;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { min-height: 100dvh; display: grid; place-items: center; padding: env(safe-area-inset-top) 1.25rem env(safe-area-inset-bottom); }
  .card { max-width: 22rem; text-align: center; padding: 2rem; border-radius: 1.5rem;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08); }
  h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
  p { font-size: 0.9rem; color: #94A3B8; margin: 0 0 1.5rem; line-height: 1.5; }
  button { appearance: none; border: 0; background: #3B82F6; color: white;
    border-radius: 999px; padding: 0.75rem 1.5rem; font-weight: 600; font-size: 0.9rem;
    cursor: pointer; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #F87171;
    display: inline-block; margin-right: 0.5rem; vertical-align: middle; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1><span class="dot"></span>Keine Verbindung</h1>
      <p>Die App ist offline. Zwischengespeicherte Inhalte sind weiterhin verfügbar. Prüfe deine Netzwerkverbindung.</p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </div>
</body>
</html>
